target:
  url: "https://modelcontextprotocol.io/docs/develop/build-server"
  render_js: false
  delay_seconds: 1
  timeout: 10
  retry_count: 3

extract:
  title:
    selector: "h1#page-title"
    type: css
  body:
    selector: "span[data-as='p']"
    type: css
    multiple: true

output:
  format: json
  path: "./output/result.json"
  save_html: false
